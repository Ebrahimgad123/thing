name: SonarQube Scan

on:
  workflow_call:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Check SONAR_TOKEN
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is EMPTY"
            exit 1
          else
            echo "SONAR_TOKEN exists"
          fi
      - name: SonarQube Scan (by Maven)
        run: |
          mvn compile sonar:sonar -DskipTests \
            -Dsonar.organization=ebrahimgad123 \
            -Dsonar.projectName="thing" \
            -Dsonar.projectKey=Ebrahimgad123_thing \
            -Dsonar.host.url=https://sonarcloud.io/ \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}


      # - name: SonarQube Scan (by CLI)
      #   run: |
      #     sonar-scanner \
      #     -Dsonar.projectKey=DeepikGit_Devsecops-cicd-pipeline \
      #     -Dsonar.organization=deepikgit \
      #     -Dsonar.host.url=https://sonarcloud.io \
      #     -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
      #     -Dsonar.sources=src